<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVA Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --primary: #1e40af; --primary-light: #3b82f6; --bg: #f8fafc; --white: #ffffff; --border: #e2e8f0; --text: #1e293b; --text-muted: #64748b; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .header { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; padding: 1rem 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
        .header p { font-size: 0.875rem; opacity: 0.9; }
        .main-container { display: flex; height: calc(100vh - 80px); max-width: 1600px; margin: 0 auto; }
        .chat-container { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .sidebar { width: 340px; background: var(--white); border-left: 1px solid var(--border); overflow-y: auto; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 1rem; }
        .chat-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; color: var(--text-muted); }
        .chat-empty p:first-child { font-size: 1.25rem; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; }
        .message { margin-bottom: 1rem; display: flex; }
        .message-user { justify-content: flex-end; }
        .message-assistant { justify-content: flex-start; }
        .message-content { max-width: 70%; padding: 0.75rem 1rem; border-radius: 12px; word-wrap: break-word; }
        .message-user .message-content { background: var(--primary-light); color: white; border-bottom-right-radius: 4px; }
        .message-assistant .message-content { background: var(--white); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .message-content p { margin: 0; line-height: 1.5; }
        .message-sources { margin-top: 0.5rem; font-size: 0.75rem; }
        .message-sources summary { cursor: pointer; color: var(--primary-light); }
        .sources-list { margin-top: 0.25rem; display: flex; flex-direction: column; gap: 0.25rem; }
        .sources-list a { text-decoration: none; }
        .sources-list a:hover { text-decoration: underline; }
        .message-meta { margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--border); font-size: 0.7rem; color: #94a3b8; display: flex; gap: 1rem; }
        .chat-input { display: flex; gap: 0.5rem; padding: 1rem; background: var(--white); border-top: 1px solid var(--border); }
        .chat-input input { flex: 1; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; outline: none; }
        .chat-input input:focus { border-color: var(--primary-light); }
        .chat-input input:disabled { background: var(--bg); }
        .chat-input button { padding: 0.75rem 1.5rem; background: var(--primary-light); color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
        .chat-input button:hover:not(:disabled) { background: #2563eb; }
        .chat-input button:disabled { background: #94a3b8; cursor: not-allowed; }
        .system-status { padding: 1rem; border-bottom: 1px solid var(--border); }
        .system-status h3 { font-size: 1rem; margin-bottom: 0.75rem; color: var(--text); }
        .loading { color: var(--text-muted); font-size: 0.875rem; }
        .load-bar-container { margin-bottom: 1rem; }
        .load-bar-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem; }
        .load-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
        .load-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
        .metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; margin-bottom: 0.75rem; }
        .metric { display: flex; flex-direction: column; padding: 0.5rem; background: var(--bg); border-radius: 6px; }
        .metric-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
        .metric-value { font-size: 1rem; font-weight: 600; color: var(--text); }
        .warning-banner { display: flex; justify-content: space-between; padding: 0.5rem; background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; font-size: 0.75rem; color: #dc2626; margin-bottom: 0.25rem; }
        .warning-banner button { background: none; border: none; color: #dc2626; cursor: pointer; }
        .update-note { font-size: 0.7rem; color: #94a3b8; text-align: center; }
        .sidebar-section { margin-bottom: 0.5rem; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .section-header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: var(--bg); border: none; font-size: 0.875rem; font-weight: 500; cursor: pointer; }
        .section-header:hover { background: #f1f5f9; }
        .section-header.expanded { background: var(--border); }
        .arrow { font-size: 0.7rem; color: var(--text-muted); }
        .section-content { padding: 0.75rem; background: var(--white); }
        .section-content select { width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.875rem; cursor: pointer; }
        .stat-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.375rem 0; font-size: 0.8rem; color: #475569; }
        .stat-item span:nth-child(2) { flex: 1; }
        .stat-item span:nth-child(3) { font-weight: 500; }
        .clear-btn { width: 100%; margin-top: 0.5rem; padding: 0.5rem; background: #ef4444; color: white; border: none; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }
        .clear-btn:hover { background: #dc2626; }
        @media (max-width: 1024px) { .main-container { flex-direction: column; height: auto; } .sidebar { width: 100%; border-left: none; border-top: 1px solid var(--border); max-height: 400px; } }
    </style>
</head>
<body>
    <header class="header">
        <h1>🎖️ DVA Assistant</h1>
        <p>Ask questions about Australian veteran entitlements and benefits</p>
    </header>
    <div class="main-container">
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="chat-empty"><p>👋 Welcome to DVA Assistant!</p><p>Ask me anything about veteran entitlements.</p></div>
            </div>
            <form class="chat-input" id="chatForm">
                <input type="text" id="chatInput" placeholder="Ask about DVA entitlements..." autocomplete="off">
                <button type="submit" id="sendBtn">Send</button>
            </form>
        </div>
        <aside class="sidebar">
            <div class="system-status" id="systemStatus">
                <h3>📊 System Status</h3>
                <div id="statusContent"><p class="loading">Loading...</p></div>
            </div>
            <div class="sidebar-section">
                <button class="section-header" onclick="toggleSection('questions')"><span>❓ Common Questions</span><span class="arrow" id="arrow-questions">▶</span></button>
                <div class="section-content" id="section-questions" style="display:none">
                    <select id="faqSelect" onchange="selectQuestion(this.value)"><option value="">Loading...</option></select>
                </div>
            </div>
            <div class="sidebar-section">
                <button class="section-header" onclick="toggleSection('settings')"><span>⚙️ Settings</span><span class="arrow" id="arrow-settings">▶</span></button>
                <div class="section-content" id="section-settings" style="display:none">
                    <div class="stat-item"><span>Recent:</span><span id="recentCount">0</span></div>
                    <div class="stat-item"><span>Context:</span><span id="contextCount">0</span></div>
                    <button class="clear-btn" onclick="clearSession()">Clear Session</button>
                </div>
            </div>
            <div class="sidebar-section">
                <button class="section-header" onclick="toggleSection('knowledge')"><span>📚 Knowledge Base</span><span class="arrow" id="arrow-knowledge">▶</span></button>
                <div class="section-content" id="section-knowledge" style="display:none"><div id="knowledgeStats"><p class="loading">Loading...</p></div></div>
            </div>
        </aside>
    </div>

    <script>
    var API = '/api';
    var STATUS_API = 'http://localhost:8503/api';
    var worker = null;
    var lastStatus = null;
    
    // Initialize Web Worker for background status polling
    function initWorker() {
        try {
            worker = new Worker('/status-worker.js');
            worker.onmessage = function(e) {
                if (e.data && e.data.type === 'status') {
                    var data = e.data.data;
                    lastStatus = data;
                    renderStatus(data);
                }
            };
            worker.onerror = function(err) {
                console.log('Worker error, using fallback');
                worker = null;
                startFallbackPolling();
            };
        } catch(e) {
            console.log('Worker init failed:', e);
            startFallbackPolling();
        }
    }
    
    // Fallback: direct polling with setInterval
    function startFallbackPolling() {
        function poll() {
            fetch(STATUS_API + '/system-status', { cache: 'no-store' })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (JSON.stringify(data) !== JSON.stringify(lastStatus)) {
                    lastStatus = data;
                    renderStatus(data);
                }
            })
            .catch(function() {});
            setTimeout(poll, 2000);
        }
        poll();
    }
    
    function renderStatus(s) {
        if (!s) return;
        var content = document.getElementById('statusContent');
        if (!content) return;
        
        var lv = s.load || 0;
        var lc = lv <= 50 ? '#22c55e' : lv <= 70 ? '#eab308' : lv <= 90 ? '#f97316' : '#ef4444';
        var ws = '';
        if (s.warnings) ws = s.warnings.map(function(w) { return '<div class="warning-banner"><span>⚠️ ' + w + '</span><button onclick="this.parentElement.remove()">✕</button></div>'; }).join('');
        var m = s.has_gpu 
            ? '<div class="metrics-grid"><div class="metric"><span class="metric-label">GPU</span><span class="metric-value">' + (s.gpu||0).toFixed(0) + '%</span></div><div class="metric"><span class="metric-label">VRAM</span><span class="metric-value">' + (s.vram||0).toFixed(0) + '%</span></div><div class="metric"><span class="metric-label">Temp</span><span class="metric-value">' + (s.gpu_temp||0) + '°C</span></div><div class="metric"><span class="metric-label">Free</span><span class="metric-value">' + (s.vram_free_gb||0).toFixed(1) + 'GB</span></div></div>'
            : '<div class="metrics-grid"><div class="metric"><span class="metric-label">CPU</span><span class="metric-value">' + (s.cpu||0).toFixed(0) + '%</span></div><div class="metric"><span class="metric-label">Memory</span><span class="metric-value">' + (s.memory||0).toFixed(0) + '%</span></div></div>';
        content.innerHTML = '<div class="load-bar-container"><div class="load-bar-label"><span>Load</span><span>' + lv.toFixed(0) + '%</span></div><div class="load-bar"><div class="load-bar-fill" style="width:' + lv + '%;background:' + lc + '"></div></div></div>' + m + ws + '<p class="update-note">🔄 ' + new Date().toLocaleTimeString() + '</p>';
    }
    
    // Initialize worker-based polling
    initWorker();
    </script>
    
    <script>
    var messages = [], sessionHistory = [], recentQuestions = [], commonQuestions = [];
    
    function toggleSection(id) {
        var c = document.getElementById('section-' + id);
        var a = document.getElementById('arrow-' + id);
        var h = c.previousElementSibling;
        if (c.style.display === 'none') { c.style.display = 'block'; a.textContent = '▼'; if (h) h.classList.add('expanded'); }
        else { c.style.display = 'none'; a.textContent = '▶'; if (h) h.classList.remove('expanded'); }
    }
    window.toggleSection = toggleSection;
    
    function selectQuestion(q) { if (q) { document.getElementById('chatInput').value = q; document.getElementById('faqSelect').value = ''; } }
    window.selectQuestion = selectQuestion;
    
    function updateStatsUI() { document.getElementById('recentCount').textContent = recentQuestions.length; document.getElementById('contextCount').textContent = sessionHistory.length; }
    
    function clearSession() { messages = []; sessionHistory = []; recentQuestions = []; renderMessages(); updateStatsUI(); }
    window.clearSession = clearSession;
    
    function renderMessages() {
        var c = document.getElementById('chatMessages');
        if (!messages.length) { c.innerHTML = '<div class="chat-empty"><p>👋 Welcome to DVA Assistant!</p><p>Ask me anything about veteran entitlements.</p></div>'; return; }
        c.innerHTML = messages.map(function(m) {
            var src = '', meta = '';
            if (m.role === 'assistant' && m.sources && m.sources.length) src = '<div class="message-sources"><details><summary>📋 Sources (' + m.sources.length + ')</summary><div class="sources-list">' + m.sources.map(function(s,i) { return '<a href="' + s.url + '" target="_blank">[' + (i+1) + '] ' + s.title + '</a>'; }).join('<br>') + '</div></details></div>';
            if (m.role === 'assistant' && m.metadata) { var p = []; if (m.metadata.model_used) p.push('Model: ' + m.metadata.model_used); if (m.metadata.latency) p.push('Latency: ' + m.metadata.latency); if (p.length) meta = '<div class="message-meta">' + p.join(' | ') + '</div>'; }
            return '<div class="message message-' + m.role + '"><div class="message-content"><p>' + m.content + '</p>' + src + meta + '</div></div>';
        }).join('');
        c.scrollTop = c.scrollHeight;
    }
    
    function sendMessage(text) {
        var i = document.getElementById('chatInput'), b = document.getElementById('sendBtn');
        if (!text.trim()) return;
        messages.push({ role: 'user', content: text });
        recentQuestions.push(text.slice(-100));
        renderMessages();
        i.value = ''; i.disabled = b.disabled = true;
        messages.push({ role: 'assistant', content: '🤔 Thinking...', sources: [], metadata: {} });
        renderMessages();
        
        // Use non-blocking fetch to allow status polling to continue
        fetch(API + '/chat', { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ message: text, session_history: sessionHistory, recent_questions: recentQuestions }) 
        })
        .then(function(r) { 
            if (!r.ok) throw new Error('API ' + r.status);
            return r.json(); 
        })
        .then(function(d) {
            messages.pop();
            // Update status from chat response (captures load during LLM generation)
            if (d.system_status) {
                lastStatus = d.system_status;
                renderStatus(d.system_status);
            }
            if (d.is_statement) { 
                sessionHistory.push({ content: text, input_type: 'statement' }); 
                messages.push({ role: 'assistant', content: d.acknowledgement, sources: [], metadata: {} }); 
            }
            else messages.push({ role: 'assistant', content: d.answer, sources: d.sources||[], metadata: d.metadata||{} });
            i.disabled = b.disabled = false;
            updateStatsUI(); renderMessages(); i.focus();
        })
        .catch(function(e) {
            messages.pop();
            messages.push({ role: 'assistant', content: 'Error: ' + e.message, sources: [], metadata: {} });
            i.disabled = b.disabled = false;
            updateStatsUI(); renderMessages(); i.focus();
        });
    }
    
    document.getElementById('chatForm').addEventListener('submit', function(e) { e.preventDefault(); sendMessage(document.getElementById('chatInput').value); });
    
    fetch(API + '/common-questions').then(function(r) { return r.json(); }).then(function(d) {
        commonQuestions = [];
        Object.values(d).forEach(function(arr) { commonQuestions.push.apply(commonQuestions, arr.slice(0, 3)); });
        document.getElementById('faqSelect').innerHTML = '<option value="">Select a question...</option>' + commonQuestions.map(function(q) { return '<option value="' + q + '">' + q + '</option>'; }).join('');
    }).catch(function() {});
    
    fetch(API + '/knowledge-stats').then(function(r) { return r.json(); }).then(function(d) {
        var c = {'DVA': '#1e40af', 'CLIK': '#7c3aed', 'Legislation': '#059669', 'default': '#666'};
        document.getElementById('knowledgeStats').innerHTML = Object.keys(d).length ? Object.entries(d).map(function(x) { return '<div class="stat-item"><span style="color:' + (c[x[0]]||c['default']) + '">●</span><span>' + x[0] + ':</span><span>' + x[1] + '</span></div>'; }).join('') : '<p class="loading">No data</p>';
    }).catch(function() { document.getElementById('knowledgeStats').innerHTML = '<p class="loading">Failed</p>'; });
    
    updateStatsUI();
    </script>
</body>
</html>
