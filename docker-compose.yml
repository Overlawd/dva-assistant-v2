services:
  ollama:
    image: ollama/ollama:0.6.1
    container_name: dva-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - dva_network

  db:
    image: pgvector/pgvector:pg15
    container_name: dva-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vets_secure_pw
      POSTGRES_DB: dva_db
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    networks:
      - dva_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dva_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: dva-api
    ports:
      - "8502:8502"
    environment:
      DATABASE_URL: postgresql://postgres:vets_secure_pw@db:5432/dva_db
      OLLAMA_BASE_URL: http://ollama:11434
      MODEL_NAME: ${MODEL_NAME:-llama3.1:8b}
      MODEL_COMPLEX: ${MODEL_COMPLEX:-qwen2.5:14b}
      SQL_MODEL: ${SQL_MODEL:-codellama:7b}
      SUMMARIZER_MODEL: ${SUMMARIZER_MODEL:-qwen2.5:7b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-mxbai-embed-large}
      LLM_CTX: ${LLM_CTX:-8192}
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - dva_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: python api.py

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dva-web
    ports:
      - "8501:80"
    depends_on:
      - api
    networks:
      - dva_network
    restart: unless-stopped

  scraper:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: dva-scraper
    environment:
      DATABASE_URL: postgresql://postgres:vets_secure_pw@db:5432/dva_db
      OLLAMA_BASE_URL: http://ollama:11434
      MODEL_NAME: ${MODEL_NAME:-llama3.1:8b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-mxbai-embed-large}
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - dva_network
    volumes:
      - ./app:/app
    command: tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  scheduler:
    image: mcuadros/ofelia:0.3.10
    container_name: dva-scheduler
    depends_on:
      - scraper
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      OFELIA_JOB_EXECUTOR: docker
      OFELIA_JOB_DOCKER_CONTAINER: dva-scraper
    networks:
      - dva_network
    labels:
      ofelia.job-run: scraper-schedule
      ofelia.job-run.command: "python /app/scraper.py 200 --force"
      ofelia.job-run.schedule: "0 2 1 * *"
      ofelia.job-run.timeout: 7200s
      ofelia.job-run.save-logs: "true"

networks:
  dva_network:
    driver: bridge

volumes:
  ollama_data:
  db_data:
